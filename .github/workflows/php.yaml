name: PHP Checks

on: [push, pull_request]

jobs:
    php-lint:
        name: "PHP Lint"

        runs-on: "ubuntu-latest"

        strategy:
            matrix:
                php-version:
                    - "8.0"
                    - "8.1"
                    - "8.2"

        steps:
            -
                name: "Checkout"
                uses: "actions/checkout@v2"
            -
                name: "Setup PHP"
                uses: "shivammathur/setup-php@v2"
                with:
                    php-version: "${{ matrix.php-version }}"
                    coverage: none
                    tools: composer:v2
            - 
                name: "Run PHP lint"
                run: "composer test:phplint"
    php-cs-fixer:
        name: PHP-CS-Fixer
        runs-on: ubuntu-latest
        needs: php-lint
        steps:
            - name: "Checkout"
              uses: "actions/checkout@v4"
            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.4
                  tools: composer:v2
                  extensions: zip
                  coverage: none
            - name: "Show Composer version"
              run: composer --version
            -
              name: "Install composer dependencies"
              run: "composer install --no-interaction --no-progress"
#            - run: composer require friendsofphp/php-cs-fixer:3.95.0
            - run: .Build/bin/php-cs-fixer fix --diff --dry-run
    php-compatibility:
        name: "PHPCompatibility"
        runs-on: ubuntu-latest
        needs: php-lint
        steps:
            -
                name: "Checkout"
                uses: actions/checkout@v2
            -
                name: "Install PHP"
                uses: shivammathur/setup-php@v2
                with:
                    php-version: "8.4"
                    coverage: none
                    tools: composer:v2
            -
                name: Prepare TYPO3
                uses: ./.github/actions/t3prepare
                with:
                    php-version: ${{ matrix.php-version }}
            -
                name: "Run PHP CS with PHPCompatibility rule"
                run: "composer test:phpcompat ${{ matrix.php-version }}"
        strategy:
            fail-fast: false
            matrix:
                php-version:
                    - "8.0"
                    - "8.1"
                    - "8.2"
                    - "8.3"
                    - "8.4"
